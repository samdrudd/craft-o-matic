<!DOCTYPE html>
<html>
	<head>
		<title>Silky Sam's Craft-o-Matic</title>
		
		<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta.2/css/bootstrap.min.css">
		<link rel="stylesheet" href="style.css">

		<script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
		<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
		<script src="https://use.fontawesome.com/f3009b4d7d.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.3/umd/popper.min.js"></script>
		<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta.2/js/bootstrap.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/bootbox.js/4.4.0/bootbox.min.js"></script>

		<script src="./api.js"></script>
		<script src="./models/RecipeModel.js"></script>
		<script src="./views/RecipeSearchResultsOptionsView.js"></script>
		<script src="./views/RecipeSelectedRecipesListView.js"></script>
		<script src="./controllers/RecipeController.js"></script>
	</head>
	
	<body>
		<div>
			<nav class="navbar navbar-light bg-light">
				<form id="searchForm" class="form-inline col-6">
					<input type="text" placeholder="Search" class="form-control mr-2 col-6" />
					<button type="button" class="btn btn-primary form-control mr-1" onclick="doSearch()">
						<i id="searchIcon" class="fa fa-lg p-1 shadow fa-search" title="Search"></i>
					</button>
					<button type="button" class="btn btn-secondary form-control mr-1" onclick="expandRecipes()">
						<i class="fa fa-expand fa-lg p-1 shadow" title="Expand all recipes"></i>
						<i class="fa fa-compress fa-lg p-1 shadow" title="Collapse all recipes" style="display: none;"></i>
					</button>
					<button type="button" class="btn btn-danger" title="Remove all recipes" onclick="deleteAll()">
						<i class="fa fa-trash fa-lg p-1 shadow"></i>
					</button>
				</form>
				<form class="form-inline col-5">
					<select id="recipeSelector" name="recipeSelector" class="form-control col-12">
						<option value="" selected="selected">
							No recipes yet. Search for one!
						</option>
					</select>
				</form>
			</nav>

			<div class="container-fluid">
				<div id="selectedRecipesContainer" class="row">
					<!-- Selected recipes will be added here -->
				</div>
			</div>
		</div>

		<script>
			const recipeModel = new RecipeModel();
			const recipeController = new RecipeController(recipeModel);
			const recipeSearchResultsOptionsView = new RecipeSearchResultsOptionsView("#recipeSelector");
			const recipeSelectedRecipesListView = new RecipeSelectedRecipesListView("#selectedRecipesContainer");

			// Register observers
			recipeModel.addSearchResultsObserver(recipeSearchResultsOptionsView);
			recipeModel.addSelectedRecipeObserver(recipeSelectedRecipesListView);

			// Initial notification to populate list with data from localStorage if it exists
			recipeModel.notifySelectedRecipeObservers();

			function toggleQuantityDisplay(input) {
				let ingredientName = input.parent().siblings("span");
				let quantityDisplay = input.siblings("b");
				let checkMark = input.parent().siblings("i");

				if (input.val() === input.attr("max")) {
					ingredientName.addClass("complete");
					quantityDisplay.addClass("complete");
					checkMark.show();
				} else {
					ingredientName.removeClass("complete");
					quantityDisplay.removeClass("complete");
					checkMark.hide();
				}
			}

			function checkQuantities() {
				$(".quantity").each(function() {
					toggleQuantityDisplay($(this));
				});
			}

			function updateQuantityDisplay() {
				let recipeId = $(this).closest(".recipe").attr("id");
				let ingredientId = $(this).attr("id");
				let quantityValue = $(this).val();

				toggleQuantityDisplay($(this));

				recipeController.updateQuantity(recipeId, ingredientId, quantityValue);
			}

			function doSearch() {
				$("#searchIcon").removeClass("fa-search").addClass("fa-spinner fa-spin");
				var searchString = $("input[placeholder='Search']").val();
				recipeController.search(searchString, callbacks = {
					complete: function() {
						$("#searchIcon").removeClass("fa-spinner fa-spin").addClass("fa-search");
					}
				});
			}

			function selectRecipe() {
				var selectedRecipeId = $("#recipeSelector").val();
				recipeController.select(selectedRecipeId, callbacks = {
					success: function(recipe) {
						$(`#${recipe.domid} .quantity`).change(updateQuantityDisplay);
					}
				});
			}

			function deleteRecipe(recipeId) {
				bootbox.confirm("Are you sure you want to delete this recipe?", function(result) {
					if (result) {
						recipeController.remove(recipeId);
					}
				});
			}

			$(document).ready(function() {
				$("#searchForm").on('submit', function(e) {
					e.preventDefault();
					doSearch();
				});

				$("#recipeSelector").change(selectRecipe);
				$(".quantity").change(updateQuantityDisplay);

				checkQuantities();
			});

		</script>
	</body>
</html>
